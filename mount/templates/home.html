<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
* {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    margin: 0;
    background: #eef3f7;
    
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #2f8fa3;
    color: white;
    padding: 12px 15px;
}

.menu-btn {
    font-size: 20px;
    cursor: pointer;
}

.header input {
    width: 50%;
    padding: 6px;
    border-radius: 6px;
    border: none;
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    top: 0;
    left: -260px;
    width: 240px;
    height: 100%;
    background: #2f8fa3;
    color: white;
    padding: 20px;
    transition: 0.3s;
}

.sidebar.active {
    left: 0;
}

.sidebar h3 {
    margin-bottom: 20px;
}

.sidebar a {
    display: block;
    padding: 20px;
    margin: 5px 0;
    color: rgb(74, 8, 8);
    text-decoration: none;
    border-radius: 6px;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.2);
}

/* MAIN */
.main {
    padding: 15px;
}

/* CARD */
.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.card h3 {
    margin-top: 0;
}

/* TABLE */
.table-container {
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}

th, td {
    padding: 10px;
    text-align: left;
}

th {
    color: #777;
}

tr {
    border-bottom: 1px solid #eee;
}

/* STATUS */
.status {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
}

.pending {
    background: #ffe0b2;
    color: #ff9800;
}

.complete {
    background: #c8e6c9;
    color: #2e7d32;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.small-card {
    background: white;
    padding: 12px;
    border-radius: 10px;
    text-align: center;
}

/* BOTTOM NAV */
.bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
    box-shadow: 0 -2px 6px rgba(0,0,0,0.1);
}

.bottom-nav a {
    text-decoration: none;
    color: #555;
    font-size: 12px;
}

/* DESKTOP */
@media(min-width: 768px){
    .sidebar {
        left: 0;
    }

    .main {
        margin-left: 240px;
    }

    
    
}
.s_logout{
    color: rgb(0, 0, 0);
    font-size: large;
    padding-top:250px;
    

}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <span class="menu-btn" onclick="toggleMenu()">☰</span>
    <input placeholder="Search...">
    <span>👤</span>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <span class="menu-btn" onclick="toggleMenu()">☰</span>
    <h3>Hospital</h3>
    <a href="/home/">Dashboard<br>
    <a href="/payment/">Payment</a>
    <a href="/report/">Reports</a>
<div class="s_logout">
    <a href="/logout/">Logout⛔</a>
</div>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TABLE -->
    <div class="card">
        <h3>Patient Details</h3>

        <div class="table-container">
            <table>
                <tr>{% for d in details %}
                    <tr>
                        <input type="text">
            </table>
        {% if d.status %}
            <span class="status complete">Complete</span>
        {% else %}
            <span class="status pending">Pending</span>
        {% endif %}
    </td>
</tr>
{% endfor %}
        
                </tr>
            </table>
        </div>
    </div>

    <!-- CARDS -->
    <div class="grid">
        <div class="small-card">
            <h4>Prescriptions</h4>
            <p>3 Active</p>
        </div>

        <div class="small-card">
            <h4>Diagnosis</h4>
            <p>Stable</p>
        </div>
    </div>

</div>

<script>
function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("active");
}
</script>

</body>
</html>
