<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom right, #f7c58d, #dff0c2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: #f4e1c1;
    width: 320px;
    padding: 25px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* Date badge */
.date {
    display: inline-block;
    padding: 5px 15px;
    border-radius: 20px;
    background: linear-gradient(to right, orange, green);
    color: white;
    font-size: 14px;
    margin-bottom: 10px;
}

/* Title */
h2 {
    margin: 10px 0 5px;
    color: #2d7a2d;
}

.subtitle {
    font-size: 14px;
    color: #555;
    margin-bottom: 20px;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    background: #eee;
    font-size: 14px;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(to right, orange, green);
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

/* Circle design */
.circle {
    margin: 25px auto;
    width: 80px;
    height: 80px;
    border: 3px dashed #333;
    border-radius: 50%;
}

/* Footer text */
.footer {
    font-size: 12px;
    color: #333;
}
</style>

</head>
<body>

<div class="container">

    <div class="date">WELCOME</div>

    <h2>Login</h2>
    <div class="subtitle"></div>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="circle"></div>

    <div class="footer">Happy Republic Day</div>

</div>

</body>
</html>
