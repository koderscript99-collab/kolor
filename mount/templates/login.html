<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
</head>
<body>
    <!-- templates/login.html -->
<div class="logs">
    <h2>Login</h2>
   
</div>
    <form method="POST">
    {% csrf_token %} <br>
<div class="login-box">
    <input type="text" name="username" placeholder="Username"><br><br> 
    <input type="password" name="password" placeholder="Password"><br><br>
        <button type="submit">Login</button>
    <P>DON'T HAVE AN ACCOUNT<p>   <a href="/signup">SIGNUP?</a>
</form>
</body>
<style>
    .logs{
        
        font-family: 'Courier New', Courier, monospace;
    }
    
    body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0e0f2d,#00f2fe);
}

/* Login container */
.login-box{
    background:rgb(122, 133, 145);
    padding:40px;
    width:200px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);

    /* animation */
    animation:fadeOut 1.5s ease;
}

/* Heading */
.login-box h2{
    margin-bottom:20px;
}

/* Input fields */
.login-box input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

/* Button */
.login-box button{
    width:100%;
    padding:10px;
    border:none;
    background:#4facfe;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
}

/* Button animation */
.login-box button:hover{
    background:#00c6ff;
    transform:scale(1.05);
}

/* Fade animation */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(-40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>
        
        

    

</style>
</html>
